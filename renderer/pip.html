<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; img-src 'self' data:;"
    />
    <title>Cockpit · PiP</title>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        background: #1d1f21;
        color: #c5c8c6;
        font-family: "Segoe UI", system-ui, sans-serif;
        overflow: hidden;
        user-select: none;
      }
      #pip {
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 2px;
        padding: 8px 12px;
        border: 1px solid #3a3f44;
        border-radius: 10px;
        cursor: pointer;
        -webkit-app-region: drag; /* drag the window by its body */
        transition: background 0.2s;
      }
      body.alert #pip {
        border-color: #ff5f56;
        animation: pip-alert 1s ease-in-out infinite;
      }
      @keyframes pip-alert {
        50% {
          background: #3a1715;
        }
      }
      #pip-primary {
        font-size: 26px;
        font-weight: 800;
        line-height: 1.1;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      #pip-secondary {
        font-size: 12px;
        color: #9aa0a6;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      #pip-foot {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-top: 2px;
      }
      .pip-tasks {
        font-size: 11px;
        color: #8a8f94;
      }
      .pip-tasks.overdue {
        color: #ff8a80;
        font-weight: 700;
      }
      .pip-join {
        -webkit-app-region: no-drag;
        margin-left: auto;
        border: none;
        border-radius: 5px;
        background: #2bac76;
        color: #06203a;
        font-size: 11px;
        font-weight: 700;
        padding: 3px 10px;
        cursor: pointer;
      }
      .pip-join:hover {
        background: #36c98c;
      }
    </style>
  </head>
  <body>
    <div id="pip">
      <div id="pip-primary">🕐 —</div>
      <div id="pip-secondary"></div>
      <div id="pip-foot"></div>
    </div>
    <script src="pip.js"></script>
  </body>
</html>
